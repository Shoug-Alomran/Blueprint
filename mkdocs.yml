site_name: Blueprint
site_url: https://blueprint.shoug-tech.com/
site_author: Shoug Fawaz Alomran
site_description: >
  Blueprint is a student-focused digital presence studio under ShougTech.
  We build structured static websites for portfolios, academic documentation, and workshop/course pages.
copyright: © 2026 Blueprint · All rights reserved

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/google.png
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Manrope
    code: Fira Code

nav:
  - Home: index.md
  - Packages: packages/packages.md
  - Process:
      - Overview: process/index.md
      - Intake & Fit Check: process/intake-fit-check.md
      - Discovery: process/discovery.md
      - Structure & Sitemap: process/structure-sitemap.md
      - Build: process/build.md
      - Review & Revisions: process/revisions.md
      - Deployment & Handover: process/deployment-handover.md
  - CV Templates: CV_index/CV_index.md
  - Start Project: start-project/start-project.md
  - Work:
      - Work: web-platforms/index.md
      - Demos: work-demos/work-demos.md
  - About: about/about.md
  - Contact: contact/contact.md

exclude_docs: |
  home/**
  architecture-notes/**
  infrastructure/**
  systems/**
  templates/**

markdown_extensions:
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.inlinehilite

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          site_name: "Blueprint"
          theme:
            language: en
        - locale: ar
          name: العربية
          build: true
          site_name: "بلو برنت"
          theme:
            language: ar

validation:
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: ignore
  links:
    not_found: ignore
    anchors: ignore
    unrecognized_links: ignore

extra_css:
  - styles/tokens.css
  - styles/layout.css
  - styles/components.css

extra:
  generator: false

extra_javascript:
  - javascripts/cta-footer.js
  - javascripts/standalone-theme.js
